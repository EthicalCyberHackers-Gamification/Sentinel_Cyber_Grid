kind = "web"
previewPath = "/"
title = "Ethical CyberHackers Platform"
version = "1.0.0"
id = "artifacts/ethical-cyberhackers-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18184

[services.development]
run = "pnpm --filter @workspace/ethical-cyberhackers-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ethical-cyberhackers-platform", "run", "build" ]
publicDir = "artifacts/ethical-cyberhackers-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18184"
BASE_PATH = "/"
